<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nexo Lúdico</title>

  <style>
body {
  font-family: 'Segoe UI', Arial;
  background: #0f172a;
  color: white;
  margin: 0;
  text-align: center;
}

/*⭐ Rating*/
.rating {
  margin-top: 8px;
  font-size: 16px;
  color: gold;
}

/* 🔥 Título */
h1 {
  margin-top: 20px;
  font-size: 2.5rem;
}

/* 🔍 Buscador */
input {
  padding: 12px;
  width: 250px;
  border-radius: 12px;
  border: none;
  outline: none;
  margin: 10px;
  font-size: 16px;
}

/* 🔘 Botones */
button {
  padding: 10px 18px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #00c853, #00e676);
  color: white;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.3s ease;
}

button:hover {
  transform: scale(1.05);
  background: linear-gradient(135deg, #00e676, #00c853);
}

/* 📦 Grid */
#resultados {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 25px;
  padding: 30px;
  max-width: 1400px;
  margin: auto; /* 🔥 centra todo */
  width: 100%;
}

/* 🃏 Card */
.card {
  background: #1e293b;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.6);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

/* Posicion de las  animaciones*/
.card * {
  position: relative;
  z-index: 2;
}

/* ✨ Hover */
.card:hover {
  transform: translateY(-8px) scale(1.03);
}

/* 🎲 Título */
.card h3 {
  margin-bottom: 10px;
  font-size: 18px;
}

/* ℹ️ Info */
.info {
  font-size: 14px;
  color: #cbd5e1;
}

/* ❤️ Botones dentro card */
.card button {
  margin-top: 10px;
  width: 100%;
}

/* 💫 Efecto glow */
.card::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.1), transparent);
  opacity: 0;
  transition: 0.5s;

  pointer-events: none; /*🔥 Superpone la animacion */
}

.card:hover::before {
  opacity: 1;
}

.btn-added {
  background: #475569;
  color: #cbd5e1;
  cursor: not-allowed;
}

#recomendados, #noticias {
  margin-top: 30px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  padding: 20px;
}

.noticia {
  background: #1e293b;
  padding: 15px;
  border-radius: 15px;
  text-align: left;
}

.modal {
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
/* 🔥 MODAL MEJORADO */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
  z-index: 999;
}

/* 📦 CONTENIDO */
.modal-content {
  background: #1e293b;
  padding: 30px;
  border-radius: 20px;
  max-width: 800px;
  width: 90%;
  animation: aparecer 0.3s ease;
}

/* 🎬 ANIMACIÓN */
@keyframes aparecer {
  from {
    transform: scale(0.8);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}

/* DETALLE */
.detalle {
  display: flex;
  gap: 20px;
}

.img-detalle {
  width: 250px;
  border-radius: 15px;
}

.info-detalle {
  text-align: left;
}

/*CSS MEJORADO*/
.detalle-pro {
  color: white;
}

.header-detalle {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
}

.tabs {
  display: flex;
  gap: 10px;
  margin: 20px 0;
}

.tabs button {
  background: #334155;
}

.tab-content {
  margin-top: 10px;
}

.hidden {
  display: none;
}

.card-mini {
  background: #334155;
  padding: 10px;
  border-radius: 10px;
  margin: 5px;
  cursor: pointer;
}

.card-mini:hover {
  background: #475569;
}

.tag {
  background: #22c55e;
  padding: 5px 10px;
  border-radius: 10px;
  display: inline-block;
  margin-top: 10px;
}
/*FILTOS*/
.filtros button.activo {
  background: #22c55e;
  color: white;
}
.filtro-container {
  position: relative;
  display: inline-block;
}

/*MENU DE FILTROS*/
.menu-filtros {
  position: absolute;
  top: 45px;
  left: 0;
  background: #1e293b;
  border-radius: 10px;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 5px;

  z-index: 9999;
  box-shadow: 0 10px 25px rgba(0,0,0,0.6);
}
.menu-filtros input {
  width: 100%;
  padding: 8px;
  border-radius: 8px;
  border: none;
  margin-bottom: 8px;
}

.menu-filtros label {
  font-size: 12px;
  text-align: left;
  opacity: 0.8;
}

.hidden {
  display: none;
}

.barra-superior {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
}

.card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
  border-radius: 12px;
}
</style>
</head>

<body>

  <h1>🎲 Nexo Lúdico</h1>

  <!--BUSCADOR-->
  <div class="barra-superior">

    <input id="busqueda" placeholder="Buscar juego..." />
    <button onclick="buscar()">Buscar</button>

    <div class="filtro-container">
      <button onclick="toggleFiltroMenu()">⚙️ Filtros</button>

      <div id="menuFiltros" class="menu-filtros hidden">
      
        <!-- 🎯 FILTRO RÁPIDO -->
        <button onclick="aplicarFiltro('todas')">🌍 Todas</button>
        <button onclick="aplicarFiltro('estrategia')">♟️ Estrategia</button>
        <button onclick="aplicarFiltro('fiesta')">🎉 Fiesta</button>
        <button onclick="aplicarFiltro('familiar')">👨‍👩‍👧 Familiar</button>
        <hr>

        <!-- ⭐ RATING -->
        <label>⭐ Rating mínimo</label>
        <input type="number" id="filtroRating" placeholder="Ej: 7">

        <!-- 👥 USUARIOS -->
        <label>👥 Usuarios mínimo</label>
        <input type="number" id="filtroUsuarios" placeholder="Ej: 1000">

        <!-- 🏆 RANKING -->
        <label>🏆 Ranking máximo</label>
        <input type="number" id="filtroRanking" placeholder="Ej: 500">

        <!-- 📅 AÑO -->
        <label>📅 Año mínimo</label>
        <input type="number" id="filtroAnio" placeholder="Ej: 2015">

        <button onclick="aplicarFiltrosAvanzados()">✅ Aplicar filtros</button>

      </div>
    </div>
    <button onclick="verFavoritos()">❤️</button>
  </div>

  <!-- RECOMENDADOS -->
  <h2>🔥 Recomendados</h2>
  <div id="recomendados"></div>

  <!-- RESULTADOS -->
  <div id="resultados"></div>
  <div id="verMasContainer"></div>

  <!-- MODAL -->
  <div id="modal" class="modal">
    <div class="modal-content" id="modal-content"></div>
  </div>

  <!-- NOTICIAS -->
  <h2>📰 Noticias</h2>
  <div id="noticias"></div>

  <!-- 🔥 SIEMPRE AL FINAL -->
  <script src="app.js"></script>

</body>
</html>
